name: Build & Release APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChestLauncher-debug
          path: app/build/outputs/apk/debug/ChestLauncher.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Chest Launcher ${{ github.ref_name }}"
          body: |
            ## 🎮 Chest Launcher ${{ github.ref_name }}
            ### Kurulum
            1. APK'yı indir
            2. Ayarlar → Bilinmeyen kaynaklar → İzin ver
            3. Kur ve oyna! 🎮
          files: app/build/outputs/apk/debug/ChestLauncher.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
