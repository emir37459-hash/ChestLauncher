name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Sign Release APK
        uses: r0adkll/sign-android-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        id: sign_apk
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChestLauncher-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChestLauncher-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Get tag name
        if: startsWith(github.ref, 'refs/tags/v')
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "Chest Launcher ${{ steps.tag.outputs.TAG }}"
          body: |
            ## 🎮 Chest Launcher ${{ steps.tag.outputs.TAG }}

            ### İndirme
            - **ChestLauncher-release.apk** → İmzalı sürüm (önerilen)
            - **ChestLauncher-debug.apk** → Test sürümü

            ### Kurulum
            1. APK'yı telefonuna indir
            2. Ayarlar → Bilinmeyen kaynaklar → İzin ver
            3. APK'yı kur! 🎮
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            ${{ steps.sign_apk.outputs.signedReleaseFile }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
